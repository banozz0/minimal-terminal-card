<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <style>
      .mono{font-family: ui-monospace, 'SF Mono', 'Berkeley Mono', 'IBM Plex Mono', Menlo, Consolas, monospace;}
      .fg{fill:#eeeeee}.muted{fill:#9a9a9a}.dim{fill:#626262}
      .thin{stroke:#bdbdbd;stroke-width:1.5;fill:none}
      .title{font-size:48px;font-weight:650;letter-spacing:-1px}
      .small{font-size:25px;font-weight:500}
      .tiny{font-size:18px;font-weight:500;letter-spacing:1.8px}
      .body{font-size:24px;font-weight:540}
      .foot{font-size:18px;font-weight:500;letter-spacing:1.2px}
    </style>
  </defs>
  <rect width="1600" height="1600" fill="#050505"/>
  <rect x="92" y="86" width="1416" height="1428" class="thin" opacity=".65"/>
  <line x1="92" y1="162" x2="1508" y2="162" class="thin" opacity=".55"/>
  <circle cx="134" cy="124" r="7" fill="#eeeeee" opacity=".85"/>
  <circle cx="166" cy="124" r="7" fill="#eeeeee" opacity=".45"/>
  <circle cx="198" cy="124" r="7" fill="#eeeeee" opacity=".25"/>
  <text x="1420" y="132" text-anchor="end" class="mono tiny dim">TOPIC DIGEST</text>

  <text x="154" y="252" class="mono tiny dim">AI · TOPIC</text>
  <text x="154" y="322" class="mono title fg">State of Agent Memory</text>
  <text x="154" y="372" class="mono small muted">4 sources · 2 verified · refreshed 2026</text>
  <line x1="154" y1="430" x2="1446" y2="430" class="thin" opacity=".6"/>

  <text x="154" y="498" class="mono tiny dim">CONSENSUS (VERIFIED)</text>
  <text x="154" y="546" class="mono body muted">- Local markdown/SQLite beats cloud for privacy</text>
  <text x="154" y="590" class="mono body muted">- Wikis compound; RAG re-derives per query</text>
  <text x="154" y="634" class="mono body muted">- Write-approval gates curb bad memory writes</text>
  <text x="154" y="678" class="mono body muted"></text>
  <text x="154" y="722" class="mono body muted"></text>

  <text x="154" y="806" class="mono tiny dim">OPEN QUESTIONS</text>
  <text x="154" y="854" class="mono body muted">- No head-to-head benchmark on real workloads</text>
  <text x="154" y="898" class="mono body muted">- Freshness vs cost tradeoff unsettled</text>
  <text x="154" y="942" class="mono body muted"></text>
  <text x="154" y="986" class="mono body muted"></text>

  <line x1="154" y1="1252" x2="1446" y2="1252" class="thin" opacity=".6"/>
  <text x="154" y="1324" class="mono tiny dim">STANCE</text>
  <text x="154" y="1380" class="mono small fg">Local-first, human-curated is the safe default.</text>
  <text x="154" y="1424" class="mono small muted">Benchmark before betting on any one approach.</text>

  <text x="154" y="1468" class="mono foot dim">topic/agent-memory · digest</text>
  <text x="1446" y="1468" text-anchor="end" class="mono foot dim">ai</text>
</svg>
