<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">

  <defs>
    <style>
      .mono{font-family: ui-monospace, 'SF Mono', 'Berkeley Mono', 'IBM Plex Mono', Menlo, Consolas, monospace;}
      .fg{fill:#eeeeee}.muted{fill:#9a9a9a}.dim{fill:#626262}
      .thin{stroke:#bdbdbd;stroke-width:1.5;fill:none}
      .title{font-size:48px;font-weight:650;letter-spacing:-1px}
      .small{font-size:25px;font-weight:500}
      .tiny{font-size:18px;font-weight:500;letter-spacing:1.8px}
      .head{font-size:22px;font-weight:650;letter-spacing:1.8px}
      .body{font-size:24px;font-weight:540}
      .foot{font-size:18px;font-weight:500;letter-spacing:1.2px}
    </style>
  </defs>

  <rect width="1600" height="1600" fill="#050505"/>
  <rect x="92" y="86" width="1416" height="1428" class="thin" opacity=".65"/>
  <line x1="92" y1="162" x2="1508" y2="162" class="thin" opacity=".55"/>
  <circle cx="134" cy="124" r="7" fill="#eeeeee" opacity=".85"/>
  <circle cx="166" cy="124" r="7" fill="#eeeeee" opacity=".45"/>
  <circle cx="198" cy="124" r="7" fill="#eeeeee" opacity=".25"/>
  <text x="1420" y="132" text-anchor="end" class="mono tiny dim">{{CARD_ID}}</text>

  <!-- header -->
  <text x="154" y="252" class="mono tiny dim">{{EYEBROW}}</text>
  <text x="154" y="322" class="mono title fg">{{TITLE}}</text>
  <text x="154" y="372" class="mono small muted">{{SUBTITLE}}</text>
  <line x1="154" y1="430" x2="1446" y2="430" class="thin" opacity=".6"/>

  <!-- TLDR -->
  <text x="154" y="502" class="mono tiny dim">TLDR</text>
  <text x="154" y="552" class="mono small fg">{{TLDR_LINE_1}}</text>
  <text x="154" y="590" class="mono small muted">{{TLDR_LINE_2}}</text>

  <!-- SIGNAL -->
  <text x="154" y="676" class="mono tiny dim">SIGNAL</text>
  <text x="154" y="726" class="mono body muted">{{SIGNAL_1}}</text>
  <text x="154" y="770" class="mono body muted">{{SIGNAL_2}}</text>
  <text x="154" y="814" class="mono body muted">{{SIGNAL_3}}</text>
  <text x="154" y="858" class="mono body muted">{{SIGNAL_4}}</text>
  <text x="154" y="902" class="mono body muted">{{SIGNAL_5}}</text>

  <!-- STATUS -->
  <text x="154" y="990" class="mono tiny dim">STATUS</text>
  <text x="154" y="1040" class="mono body fg">{{STATUS_LINE}}</text>

  <!-- ACTION -->
  <line x1="154" y1="1252" x2="1446" y2="1252" class="thin" opacity=".6"/>
  <text x="154" y="1324" class="mono tiny dim">ACTION</text>
  <text x="154" y="1380" class="mono small fg">{{ACTION_LINE_1}}</text>
  <text x="154" y="1424" class="mono small muted">{{ACTION_LINE_2}}</text>

  <text x="154" y="1468" class="mono foot dim">template/research-summary</text>
  <text x="1446" y="1468" text-anchor="end" class="mono foot dim">{{FOOTER_RIGHT}}</text>
</svg>
