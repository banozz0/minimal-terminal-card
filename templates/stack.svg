<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">

  <defs>
    <style>
      .mono{font-family: ui-monospace, 'SF Mono', 'Berkeley Mono', 'IBM Plex Mono', Menlo, Consolas, monospace;}
      .fg{fill:#eeeeee}.muted{fill:#9a9a9a}.dim{fill:#626262}
      .thin{stroke:#bdbdbd;stroke-width:1.5;fill:none}
      .title{font-size:50px;font-weight:650;letter-spacing:-1px}.small{font-size:24px;font-weight:500}.tiny{font-size:18px;font-weight:500;letter-spacing:1.5px}.foot{font-size:18px;font-weight:500;letter-spacing:1.2px}.layer{font-size:28px;font-weight:640}.desc{font-size:22px;font-weight:500}
    </style>
  </defs>

  <rect width="1600" height="1600" fill="#050505"/>
  <rect x="92" y="86" width="1416" height="1428" class="thin" opacity=".65"/>
  <line x1="92" y1="162" x2="1508" y2="162" class="thin" opacity=".55"/>
  <circle cx="134" cy="124" r="7" fill="#eeeeee" opacity=".85"/>
  <circle cx="166" cy="124" r="7" fill="#eeeeee" opacity=".45"/>
  <circle cx="198" cy="124" r="7" fill="#eeeeee" opacity=".25"/>
  <text x="1420" y="132" text-anchor="end" class="mono tiny dim">{{CARD_ID}}</text>

  <text x="154" y="254" class="mono tiny dim">{{EYEBROW}}</text>
  <text x="154" y="332" class="mono title fg">{{TITLE}}</text>
  <text x="154" y="384" class="mono small muted">{{SUBTITLE}}</text>
  <line x1="154" y1="452" x2="1446" y2="452" class="thin" opacity=".6"/>

  <g transform="translate(154 520)">
    <rect x="0" y="0" width="1292" height="150" class="thin" opacity=".62"/>
    <text x="28" y="46" class="mono dim">LAYER 1 · USER-FACING</text>
    <text x="28" y="96" class="mono layer fg">{{LAYER_1_TITLE}}</text>
    <text x="28" y="130" class="mono desc muted">{{LAYER_1_DESC}}</text>

    <rect x="0" y="172" width="1292" height="150" class="thin" opacity=".62"/>
    <text x="28" y="218" class="mono dim">LAYER 2 · COORDINATION</text>
    <text x="28" y="268" class="mono layer fg">{{LAYER_2_TITLE}}</text>
    <text x="28" y="302" class="mono desc muted">{{LAYER_2_DESC}}</text>

    <rect x="0" y="344" width="1292" height="150" class="thin" opacity=".62"/>
    <text x="28" y="390" class="mono dim">LAYER 3 · CAPABILITY</text>
    <text x="28" y="440" class="mono layer fg">{{LAYER_3_TITLE}}</text>
    <text x="28" y="474" class="mono desc muted">{{LAYER_3_DESC}}</text>

    <rect x="0" y="516" width="1292" height="150" class="thin" opacity=".62"/>
    <text x="28" y="562" class="mono dim">LAYER 4 · FOUNDATION</text>
    <text x="28" y="612" class="mono layer fg">{{LAYER_4_TITLE}}</text>
    <text x="28" y="646" class="mono desc muted">{{LAYER_4_DESC}}</text>
  </g>

  <line x1="154" y1="1252" x2="1446" y2="1252" class="thin" opacity=".6"/>
  <text x="154" y="1324" class="mono tiny dim">RULE</text>
  <text x="154" y="1380" class="mono small fg">{{RULE_LINE_1}}</text>
  <text x="154" y="1428" class="mono small muted">{{RULE_LINE_2}}</text>

  <text x="154" y="1468" class="mono foot dim">template/stack</text>
  <text x="1446" y="1468" text-anchor="end" class="mono foot dim">{{FOOTER_RIGHT}}</text>
</svg>
