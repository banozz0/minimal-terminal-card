<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">

  <defs>
    <style>
      .mono{font-family: ui-monospace, 'SF Mono', 'Berkeley Mono', 'IBM Plex Mono', Menlo, Consolas, monospace;}
      .fg{fill:#eeeeee}.muted{fill:#9a9a9a}.dim{fill:#626262}
      .stroke{stroke:#eeeeee;stroke-width:2;fill:none}.thin{stroke:#bdbdbd;stroke-width:1.5;fill:none}.dash{stroke-dasharray:8 8}
      .title{font-size:50px;font-weight:650;letter-spacing:-1px}.small{font-size:24px;font-weight:500}.tiny{font-size:18px;font-weight:500;letter-spacing:1.5px}.label{font-size:28px;font-weight:600}.boxText{font-size:24px;font-weight:540}.num{font-size:24px;font-weight:600}.foot{font-size:18px;font-weight:500;letter-spacing:1.2px}.mini{font-size:20px;font-weight:500}.table{font-size:22px;font-weight:520}.big{font-size:34px;font-weight:650;letter-spacing:-.5px}.day{font-size:22px;font-weight:650;letter-spacing:1.8px}.game{font-size:20px;font-weight:540}.time{font-size:20px;font-weight:650}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#eeeeee" stroke-width="1.6"/></marker>
  </defs>

  <rect width="1600" height="1600" fill="#050505"/>
  <rect x="92" y="86" width="1416" height="1428" class="thin" opacity=".65"/>
  <line x1="92" y1="162" x2="1508" y2="162" class="thin" opacity=".55"/>
  <circle cx="134" cy="124" r="7" fill="#eeeeee" opacity=".85"/>
  <circle cx="166" cy="124" r="7" fill="#eeeeee" opacity=".45"/>
  <circle cx="198" cy="124" r="7" fill="#eeeeee" opacity=".25"/>
  <text x="1420" y="132" text-anchor="end" class="mono tiny dim">02/04</text>

  <text x="154" y="254" class="mono tiny dim">PROOF OVER CONFIDENCE</text>
  <text x="154" y="332" class="mono title fg">the trust loop</text>
  <text x="154" y="384" class="mono small muted">a small operating model for reliable work</text>
  <line x1="154" y1="452" x2="1446" y2="452" class="thin" opacity=".6"/>

  <!-- Replace 4 step boxes and the numbered notes. Arrows stop before boxes. -->
  <g transform="translate(154 535)">
    <text x="0" y="0" class="mono tiny dim">LINEAR PROCESS</text>
    <rect x="0" y="82" width="238" height="112" class="stroke"/><text x="34" y="126" class="mono boxText fg">inspect</text><text x="34" y="160" class="mono mini muted">current state</text>
    <rect x="312" y="82" width="238" height="112" class="stroke"/><text x="346" y="126" class="mono boxText fg">act</text><text x="346" y="160" class="mono mini muted">small change</text>
    <rect x="624" y="82" width="238" height="112" class="stroke"/><text x="658" y="126" class="mono boxText fg">verify</text><text x="658" y="160" class="mono mini muted">real check</text>
    <rect x="936" y="82" width="238" height="112" class="stroke"/><text x="970" y="126" class="mono boxText fg">report</text><text x="970" y="160" class="mono mini muted">evidence</text>
    <path d="M254 138 H296" class="thin" marker-end="url(#arrow)"/><path d="M566 138 H608" class="thin" marker-end="url(#arrow)"/><path d="M878 138 H920" class="thin" marker-end="url(#arrow)"/>
    <line x1="0" y1="278" x2="1248" y2="278" class="thin" opacity=".42"/>
    <text x="0" y="350" class="mono num fg">01.</text><text x="82" y="350" class="mono label fg">inspection prevents theater</text><text x="82" y="394" class="mono small muted">you cannot fix what you have not seen</text>
    <line x1="82" y1="438" x2="1248" y2="438" class="thin" opacity=".28"/>
    <text x="0" y="512" class="mono num fg">02.</text><text x="82" y="512" class="mono label fg">small changes fail cleaner</text><text x="82" y="556" class="mono small muted">less surface area means easier recovery</text>
    <line x1="82" y1="600" x2="1248" y2="600" class="thin" opacity=".28"/>
    <text x="0" y="674" class="mono num fg">03.</text><text x="82" y="674" class="mono label fg">verification closes the loop</text><text x="82" y="718" class="mono small muted">the claim must match the observed output</text>
  </g>

  <line x1="154" y1="1252" x2="1446" y2="1252" class="thin" opacity=".6"/>
  <text x="154" y="1324" class="mono tiny dim">RULE</text>
  <text x="154" y="1380" class="mono small fg">The loop is only complete after verification.</text>
  <text x="154" y="1428" class="mono small muted">Everything before proof is still just a proposal.</text>

  <text x="154" y="1468" class="mono foot dim">skill/minimal-terminal-card</text>
  <text x="1446" y="1468" text-anchor="end" class="mono foot dim">proof thread</text>
</svg>
