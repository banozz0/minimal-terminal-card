<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">

  <defs>
    <style>
      .mono{font-family: ui-monospace, 'SF Mono', 'Berkeley Mono', 'IBM Plex Mono', Menlo, Consolas, monospace;}
      .fg{fill:#eeeeee}.muted{fill:#9a9a9a}.dim{fill:#626262}
      .stroke{stroke:#eeeeee;stroke-width:2;fill:none}.thin{stroke:#bdbdbd;stroke-width:1.5;fill:none}.dash{stroke-dasharray:8 8}
      .title{font-size:50px;font-weight:650;letter-spacing:-1px}.small{font-size:24px;font-weight:500}.tiny{font-size:18px;font-weight:500;letter-spacing:1.5px}.label{font-size:28px;font-weight:600}.boxText{font-size:24px;font-weight:540}.num{font-size:24px;font-weight:600}.foot{font-size:18px;font-weight:500;letter-spacing:1.2px}.mini{font-size:20px;font-weight:500}.table{font-size:22px;font-weight:520}.big{font-size:34px;font-weight:650;letter-spacing:-.5px}.day{font-size:22px;font-weight:650;letter-spacing:1.8px}.game{font-size:20px;font-weight:540}.time{font-size:20px;font-weight:650}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#eeeeee" stroke-width="1.6"/></marker>
  </defs>

  <rect width="1600" height="1600" fill="#050505"/>
  <rect x="92" y="86" width="1416" height="1428" class="thin" opacity=".65"/>
  <line x1="92" y1="162" x2="1508" y2="162" class="thin" opacity=".55"/>
  <circle cx="134" cy="124" r="7" fill="#eeeeee" opacity=".85"/>
  <circle cx="166" cy="124" r="7" fill="#eeeeee" opacity=".45"/>
  <circle cx="198" cy="124" r="7" fill="#eeeeee" opacity=".25"/>
  <text x="1420" y="132" text-anchor="end" class="mono tiny dim">01/04</text>

  <text x="154" y="254" class="mono tiny dim">PROOF OVER CONFIDENCE</text>
  <text x="154" y="332" class="mono title fg">proof beats confidence</text>
  <text x="154" y="384" class="mono small muted">the core rule for trustworthy automated work</text>
  <line x1="154" y1="452" x2="1446" y2="452" class="thin" opacity=".6"/>

  <!-- Replace left/right headings and each row pair. Keep 3-5 rows. -->
  <g transform="translate(154 540)">
    <text x="0" y="0" class="mono tiny dim">COMPARISON</text>
    <line x1="646" y1="46" x2="646" y2="670" class="thin" opacity=".42"/>
    <text x="0" y="96" class="mono big fg">confidence</text>
    <text x="740" y="96" class="mono big fg">proof</text>
    <text x="0" y="142" class="mono small muted">sounds plausible</text>
    <text x="740" y="142" class="mono small muted">can be checked</text>
    <line x1="0" y1="204" x2="1248" y2="204" class="thin" opacity=".42"/>
    <text x="0" y="270" class="mono num fg">01.</text><text x="76" y="270" class="mono label fg">sounds right</text>
    <text x="740" y="270" class="mono num fg">01.</text><text x="816" y="270" class="mono label fg">command output</text>
    <line x1="0" y1="322" x2="1248" y2="322" class="thin" opacity=".25"/>
    <text x="0" y="388" class="mono num fg">02.</text><text x="76" y="388" class="mono label fg">probably fixed</text>
    <text x="740" y="388" class="mono num fg">02.</text><text x="816" y="388" class="mono label fg">regression test</text>
    <line x1="0" y1="440" x2="1248" y2="440" class="thin" opacity=".25"/>
    <text x="0" y="506" class="mono num fg">03.</text><text x="76" y="506" class="mono label fg">agent said done</text>
    <text x="740" y="506" class="mono num fg">03.</text><text x="816" y="506" class="mono label fg">verified artifact</text>
    <line x1="0" y1="558" x2="1248" y2="558" class="thin" opacity=".25"/>
    <text x="0" y="624" class="mono num fg">04.</text><text x="76" y="624" class="mono label fg">looks okay</text>
    <text x="740" y="624" class="mono num fg">04.</text><text x="816" y="624" class="mono label fg">inspected result</text>
  </g>

  <line x1="154" y1="1252" x2="1446" y2="1252" class="thin" opacity=".6"/>
  <text x="154" y="1324" class="mono tiny dim">RULE</text>
  <text x="154" y="1380" class="mono small fg">Trust starts when claims become checkable.</text>
  <text x="154" y="1428" class="mono small muted">If there is no artifact, there is no proof.</text>

  <text x="154" y="1468" class="mono foot dim">skill/minimal-terminal-card</text>
  <text x="1446" y="1468" text-anchor="end" class="mono foot dim">proof thread</text>
</svg>
