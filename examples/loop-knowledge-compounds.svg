<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">

  <defs>
    <style>
      .mono{font-family: ui-monospace, 'SF Mono', 'Berkeley Mono', 'IBM Plex Mono', Menlo, Consolas, monospace;}
      .fg{fill:#eeeeee}.muted{fill:#9a9a9a}.dim{fill:#626262}
      .stroke{stroke:#eeeeee;stroke-width:2;fill:none}.thin{stroke:#bdbdbd;stroke-width:1.5;fill:none}.dash{stroke-dasharray:8 8}
      .title{font-size:50px;font-weight:650;letter-spacing:-1px}.small{font-size:24px;font-weight:500}.tiny{font-size:18px;font-weight:500;letter-spacing:1.5px}.label{font-size:28px;font-weight:600}.boxText{font-size:24px;font-weight:540}.num{font-size:24px;font-weight:600}.foot{font-size:18px;font-weight:500;letter-spacing:1.2px}.mini{font-size:20px;font-weight:500}.table{font-size:22px;font-weight:520}.big{font-size:34px;font-weight:650;letter-spacing:-.5px}.day{font-size:22px;font-weight:650;letter-spacing:1.8px}.game{font-size:20px;font-weight:540}.time{font-size:20px;font-weight:650}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#eeeeee" stroke-width="1.6"/></marker>
  </defs>

  <rect width="1600" height="1600" fill="#050505"/>
  <rect x="92" y="86" width="1416" height="1428" class="thin" opacity=".65"/>
  <line x1="92" y1="162" x2="1508" y2="162" class="thin" opacity=".55"/>
  <circle cx="134" cy="124" r="7" fill="#eeeeee" opacity=".85"/>
  <circle cx="166" cy="124" r="7" fill="#eeeeee" opacity=".45"/>
  <circle cx="198" cy="124" r="7" fill="#eeeeee" opacity=".25"/>
  <text x="1420" y="132" text-anchor="end" class="mono tiny dim">example_002</text>

  <text x="154" y="254" class="mono tiny dim">SYSTEM NOTE</text>
  <text x="154" y="332" class="mono title fg">how knowledge compounds</text>
  <text x="154" y="384" class="mono small muted">a circular layout for recurring systems.</text>
  <line x1="154" y1="452" x2="1446" y2="452" class="thin" opacity=".6"/>

  <g transform="translate(154 500)">
    <text x="0" y="22" class="mono tiny dim">CIRCULAR FLOW</text>
    <rect x="122" y="96" width="1048" height="650" class="thin" opacity=".62"/>
    <text x="514" y="394" class="mono big fg">knowledge</text>
    <text x="466" y="436" class="mono small muted">compounds only when</text>
    <text x="512" y="476" class="mono small muted">the loop closes</text>
    <rect x="120" y="250" width="210" height="82" class="stroke"/><text x="168" y="300" class="mono boxText fg">capture</text>
    <rect x="450" y="126" width="210" height="82" class="stroke"/><text x="504" y="176" class="mono boxText fg">extract</text>
    <rect x="782" y="250" width="210" height="82" class="stroke"/><text x="836" y="300" class="mono boxText fg">verify</text>
    <rect x="782" y="520" width="210" height="82" class="stroke"/><text x="846" y="570" class="mono boxText fg">store</text>
    <rect x="450" y="642" width="210" height="82" class="stroke"/><text x="496" y="692" class="mono boxText fg">retrieve</text>
    <rect x="120" y="520" width="210" height="82" class="stroke"/><text x="170" y="570" class="mono boxText fg">improve</text>
    <path d="M346 291 H390 V167 H434" class="thin" marker-end="url(#arrow)"/><path d="M676 167 H736 V291 H766" class="thin" marker-end="url(#arrow)"/>
    <path d="M887 348 V504" class="thin" marker-end="url(#arrow)"/><path d="M766 561 H706 V683 H676" class="thin" marker-end="url(#arrow)"/>
    <path d="M434 683 H374 V561 H346" class="thin" marker-end="url(#arrow)"/><path d="M225 504 V348" class="thin dash" marker-end="url(#arrow)"/>
  </g>

  <line x1="154" y1="1252" x2="1446" y2="1252" class="thin" opacity=".6"/>
  <text x="154" y="1324" class="mono tiny dim">RULE</text>
  <text x="154" y="1380" class="mono small fg">knowledge is not storage. knowledge is a feedback loop.</text>
  <text x="154" y="1428" class="mono small muted">capture is cheap. verified retrieval is leverage.</text>

  <text x="154" y="1468" class="mono foot dim">example/loop</text>
  <text x="1446" y="1468" text-anchor="end" class="mono foot dim">terminal.cards</text>
</svg>
